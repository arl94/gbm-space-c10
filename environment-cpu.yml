# C10 environment -- CPU only. Works on Linux, macOS (Intel and Apple Silicon) and Windows.
#
#   conda env create -f environment-cpu.yml
#   conda activate c10
#   python -c "import scanpy, squidpy, cell2location, liana, infercnvpy; print('ok')"
#
# This is the right choice for a laptop. Everything in the project runs on CPU: the two
# GPU-accelerated steps (scVI in Level 1, cell2location training in Level 2) ship their
# full-scale outputs in precomputed/, and the notebooks load those by default. Use
# environment-gpu.yml only if you want to retrain those yourself on a CUDA machine.
#
# Only direct dependencies are pinned; pip resolves the rest. Versions are the ones the
# published solution notebooks were actually executed with.
name: c10
channels:
  - conda-forge
  - nodefaults
dependencies:
  - python=3.11
  - pip
  - pip:
      # CPU-only PyTorch. This index is what keeps the ~4.6 GB of CUDA wheels out.
      - --extra-index-url https://download.pytorch.org/whl/cpu
      - torch==2.12.1
      - pytorch-lightning==2.6.5

      # Core single-cell stack
      - anndata==0.12.18
      - scanpy==1.11.5
      - numpy==2.4.6
      - pandas==2.3.3
      - scipy==1.17.1
      - scikit-learn==1.9.0
      - scikit-misc==0.5.2          # scanpy's seurat_v3 highly-variable-gene flavor
      - numba==0.65.1

      # Clustering / integration
      - leidenalg==0.12.0
      - igraph==1.0.0
      - harmonypy==2.0.0            # Level 1 batch integration (CPU)
      - scvi-tools==1.4.2           # Level 1 scVI (loads a precomputed latent by default)

      # Annotation and copy-number inference
      - celltypist==1.7.1           # Level 1: Developing_Human_Brain model (downloads on first use)
      - infercnvpy==0.6.1           # Level 1: malignant vs TME

      # Spatial
      - squidpy==1.8.2              # Levels 2-3: neighborhoods, spatial plots
      - numpy-groupies==0.11.3      # squidpy runtime dependency
      - cell2location==0.1.5        # Level 2 deconvolution (loads precomputed maps by default)
      - liana==1.7.3                # Level 2 cell-cell communication
      - decoupler==2.1.6            # liana dependency used directly by the scoring steps

      # IO and plotting
      - pyarrow==24.0.0             # Level 3: reads transcripts.parquet
      - zarr==3.1.6
      - dask==2025.12.0
      - pooch==1.9.0
      - matplotlib==3.11.0
      - seaborn==0.13.2
      - adjustText==1.4.0

      # Notebook interface
      - jupyterlab==4.6.0
      - ipykernel==7.3.0
      - ipywidgets==8.1.8
